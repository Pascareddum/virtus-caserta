<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notizie – Virtus Caserta</title>
  <meta name="description" content="Le ultime notizie e comunicati di Virtus Caserta ASD.">
  <meta property="og:title" content="Notizie – Virtus Caserta">
  <meta property="og:description" content="Le ultime notizie e comunicati di Virtus Caserta ASD.">
  <meta property="og:image" content="/images/logo.png">
  <meta property="og:type" content="website">
  <style>
    :root {
      --blu:     #0d2055;
      --blu-m:   #1535a8;
      --arancio: #f57c00;
      --bianco:  #ffffff;
      --grigio:  #f2f2f7;
      --bordo:   #e5e5ea;
      --testo:   #1c1c1e;
      --sub:     #8e8e93;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',Arial,sans-serif; background:var(--grigio); color:var(--testo); min-height:100vh; }

    /* ── NAV ── */
    nav {
      position:fixed; top:0; left:0; width:100%; z-index:1000;
      background:var(--blu); box-shadow:0 2px 16px rgba(0,0,0,0.35);
      display:grid; grid-template-columns:1fr auto 1fr;
      align-items:center; height:76px; padding:0 40px;
    }
    .nav-menu {
      display:flex; align-items:center; gap:36px;
      list-style:none; justify-content:flex-end;
    }
    .nav-brand {
      display:flex; align-items:center; justify-content:center;
      text-decoration:none; padding:0 28px;
    }
    .nav-brand img { height:50px; width:auto; object-fit:contain; display:block; transition:transform .25s ease; }
    .nav-brand:hover img { transform:scale(1.1); }
    .nav-menu a {
      text-decoration:none; color:rgba(255,255,255,.82);
      font-size:14px; font-weight:600; letter-spacing:1.5px;
      text-transform:uppercase; padding:4px 0;
      position:relative; transition:color .2s; white-space:nowrap;
    }
    .nav-menu a::after {
      content:''; position:absolute; bottom:-2px; left:0;
      width:0; height:2px; background:var(--arancio); transition:width .25s ease;
    }
    .nav-menu a:hover, .nav-menu a.attivo { color:#fff; }
    .nav-menu a:hover::after, .nav-menu a.attivo::after { width:100%; }
    .nav-actions { display:flex; align-items:center; gap:14px; justify-content:flex-start; }
    .nav-social { display:flex; align-items:center; gap:10px; margin-left:auto; }
    .nav-social a {
      width:34px; height:34px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      text-decoration:none; font-size:15px; font-weight:900;
      color:#fff; transition:opacity .2s, transform .15s;
    }
    .nav-social a:hover { opacity:.8; transform:scale(1.1); }
    .nav-social .s-fb, .nav-social .s-ig { background:none; }
    .nav-social a img { width:100%; height:100%; object-fit:contain; display:block; filter:brightness(0) invert(1); }

    /* ── HERO ── */
    .hero {
      margin-top:76px;
      background:linear-gradient(135deg, var(--blu) 0%, var(--blu-m) 100%);
      padding:60px 24px 48px;
      text-align:center; color:#fff;
    }
    .etichetta {
      display:inline-block; background:var(--arancio); color:#fff;
      font-size:11px; font-weight:700; letter-spacing:3px;
      text-transform:uppercase; padding:5px 16px; border-radius:20px; margin-bottom:14px;
    }
    .hero h1 { font-size:clamp(28px,5vw,44px); font-weight:900; letter-spacing:2px; text-transform:uppercase; }

    /* ── CONTENT ── */
    .container { max-width:820px; margin:0 auto; padding:40px 24px 80px; }

    .news-grid { display:flex; flex-direction:column; gap:24px; }

    .news-card {
      background:var(--bianco); border-radius:18px;
      overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,.07);
      display:grid; grid-template-columns:6px 1fr;
    }
    .news-accent { }   /* colored left bar set via inline style */
    .news-body { padding:24px 28px; }

    .news-meta { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .news-cat {
      font-size:10px; font-weight:800; letter-spacing:2px; text-transform:uppercase;
      padding:3px 10px; border-radius:20px; color:#fff;
    }
    .cat-blu     { background:var(--blu); }
    .cat-arancio { background:var(--arancio); }
    .cat-azzurro { background:#1565c0; }

    .news-data { font-size:12px; color:var(--sub); font-weight:600; }

    .news-titolo { font-size:20px; font-weight:800; color:var(--testo); margin-bottom:10px; line-height:1.3; }
    .news-testo  { font-size:15px; color:#444; line-height:1.65; }

    .news-img {
      width:100%; max-height:280px; object-fit:cover;
      border-radius:10px; margin-bottom:16px;
    }

    .news-vuote {
      text-align:center; padding:60px 24px; color:var(--sub); font-size:16px;
    }

    .news-share { display:flex; gap:8px; margin-top:16px; flex-wrap:wrap; }
    .share-btn {
      display:inline-flex; align-items:center; gap:6px;
      font-size:12px; font-weight:700; letter-spacing:.8px; text-transform:uppercase;
      padding:6px 14px; border-radius:20px; border:none; cursor:pointer;
      text-decoration:none; transition:opacity .2s;
    }
    .share-btn:hover { opacity:.82; }
    .share-fb  { background:#1877f2; color:#fff; }

    @media (max-width:600px) {
      nav { padding:0 16px; height:60px; }
      .nav-brand img { height:38px; }
      .nav-menu { gap:16px; }
      .nav-menu a { font-size:11px; letter-spacing:.8px; }
      .hero { padding:44px 16px 36px; }
      .container { padding:28px 14px 60px; }
      .news-body { padding:18px 20px; }
    }

    /* ── FOOTER ── */
    footer { background:#0d1730; color:rgba(255,255,255,0.5); font-size:14px; }
    footer span { color:#f57c00; }
    .footer-top {
      display:grid; grid-template-columns:1fr auto 1fr;
      align-items:start; gap:40px;
      max-width:1100px; margin:0 auto; padding:48px 40px 36px;
    }
    .footer-col { display:flex; flex-direction:column; gap:8px; }
    .footer-col-right { text-align:right; }
    .footer-col-title {
      font-size:11px; font-weight:700; letter-spacing:2px;
      text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:6px;
    }
    .footer-col a { color:rgba(255,255,255,0.65); text-decoration:none; font-size:13px; transition:color .2s; }
    .footer-col a:hover { color:#fff; }
    .footer-center { text-align:center; }
    .footer-logo img { height:56px; width:auto; opacity:.85; margin-bottom:12px; }
    .footer-social { display:flex; justify-content:center; gap:12px; margin-top:16px; }
    .footer-social a {
      width:38px; height:38px; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      text-decoration:none; transition:opacity .2s; background:none;
    }
    .footer-social a:hover { opacity:.8; }
    .footer-social a img { width:100%; height:100%; object-fit:contain; display:block; filter: brightness(0) invert(1); }
    .footer-bottom { border-top:1px solid rgba(255,255,255,0.07); text-align:center; padding:16px 24px; font-size:12px; }
    @media (max-width:700px) {
      .footer-top { grid-template-columns:1fr; text-align:center; padding:32px 24px 24px; }
      .footer-col-right { text-align:center; }
      .footer-col a { display:inline-block; margin:2px 6px; }
    }
  </style>
</head>
<body>

  <nav>
    <ul class="nav-menu">
      <li><a href="/chi-siamo">Chi siamo</a></li>
      <li><a href="/notizie" class="attivo">Notizie</a></li>
      <li><a href="/squadra">Squadra</a></li>
    </ul>
    <a href="/" class="nav-brand">
      <img src="images/logo.png" alt="Virtus Caserta" onerror="this.style.display='none'">
    </a>
    <div class="nav-actions">
      <ul class="nav-menu" style="justify-content:flex-start;">
        <li><a href="/risultati">Risultati</a></li>
        <li><a href="/shop">Shop</a></li>
        <li><a href="/staff">Staff</a></li>
      </ul>
      <div class="nav-social">
        <a href="https://www.facebook.com/virtuscaserta" target="_blank" rel="noopener" class="s-fb" title="Facebook"><img src="images/facebook-icon.png" alt="Facebook"></a>
        <a href="https://www.instagram.com/virtuscaserta/" target="_blank" rel="noopener" class="s-ig" title="Instagram"><img src="images/instagram-icon.png" alt="Instagram"></a>
      </div>
    </div>
  </nav>

  <div class="hero">
    <div class="etichetta">Aggiornamenti</div>
    <h1>Notizie</h1>
  </div>

  <div class="container">
    <div class="news-grid" id="newsGrid">
      <div class="news-vuote">Caricamento notizie…</div>
    </div>
  </div>

  <footer>
    <div class="footer-top">
      <div class="footer-col">
        <div class="footer-col-title">Esplora</div>
        <a href="index.html">Home</a>
        <a href="chiSiamo.html">Chi siamo</a>
        <a href="notizie.html">Notizie</a>
        <a href="shop.html">Shop</a>
      </div>
      <div class="footer-center">
        <div class="footer-logo">
          <img src="images/logo.png" alt="Virtus Caserta" onerror="this.style.display='none'">
        </div>
        <div class="footer-social">
          <a href="https://www.facebook.com/virtuscaserta" target="_blank" rel="noopener" title="Facebook"><img src="images/facebook-icon.png" alt="Facebook"></a>
          <a href="https://www.instagram.com/virtuscaserta/" target="_blank" rel="noopener" title="Instagram"><img src="images/instagram-icon.png" alt="Instagram"></a>
        </div>
      </div>
      <div class="footer-col footer-col-right">
        <div class="footer-col-title">Contatti</div>
        <a href="index.html#contatti">Contattaci</a>
        <a href="index.html#partite">Risultati</a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>© 2026 <span>Virtus Caserta</span> – Società Sportiva Pallavolo · Affiliata <span>FIPAV</span></p>
    </div>
  </footer>

  <script>
    const COLORI = { blu:'#0d2055', arancio:'#f57c00', azzurro:'#1565c0' };

    function catClass(c) {
      if (c === 'arancio') return 'cat-arancio';
      if (c === 'azzurro') return 'cat-azzurro';
      return 'cat-blu';
    }

    function condividiSuFacebook(titolo) {
      const url = encodeURIComponent(window.location.href);
      const q   = encodeURIComponent(titolo);
      window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${q}`, '_blank', 'width=600,height=400');
    }

async function carica() {
      const grid = document.getElementById('newsGrid');
      try {
        const notizie = await fetch('/api/notizie').then(r => r.json());
        if (!notizie.length) {
          grid.innerHTML = '<div class="news-vuote">Nessuna notizia disponibile.</div>';
          return;
        }
        grid.innerHTML = notizie.map((n, i) => {
          const colore = COLORI[n.colore] || COLORI.blu;
          const img = n.immagine
            ? `<img src="${n.immagine}" alt="" class="news-img" loading="lazy">`
            : '';
          const titoloSafe = (n.titolo || '').replace(/'/g, "\\'");
          return `
            <article class="news-card" id="notizia-${n.id}">
              <div class="news-accent" style="background:${colore};"></div>
              <div class="news-body">
                ${img}
                <div class="news-meta">
                  <span class="news-cat ${catClass(n.colore)}">${n.colore === 'arancio' ? 'Comunicato' : n.colore === 'azzurro' ? 'Risultato' : 'Notizia'}</span>
                  <span class="news-data">${n.data || ''}</span>
                </div>
                <div class="news-titolo">${n.titolo}</div>
                <div class="news-testo">${n.testo}</div>
                <div class="news-share">
                  <button class="share-btn share-fb" onclick="condividiSuFacebook('${titoloSafe}')">
                    <img src="images/facebook-icon.png" style="height:14px;vertical-align:middle;margin-right:5px;"> Facebook
                  </button>
                </div>
              </div>
            </article>`;
        }).join('');
        // Scroll all'articolo se c'è un anchor nell'URL (#notizia-ID)
        const hash = window.location.hash;
        if (hash) {
          const target = document.querySelector(hash);
          if (target) {
            setTimeout(() => {
              target.scrollIntoView({ behavior: 'smooth', block: 'center' });
              target.style.outline = '3px solid var(--arancio)';
              target.style.borderRadius = '18px';
              setTimeout(() => { target.style.outline = ''; }, 2000);
            }, 100);
          }
        }
      } catch {
        grid.innerHTML = '<div class="news-vuote">Errore nel caricamento delle notizie.</div>';
      }
    }

    carica();
  </script>
  <script src="common.js"></script>
</body>
</html>
