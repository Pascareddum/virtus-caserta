<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reimposta Password – Virtus Caserta</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 40px 32px; width: 100%; max-width: 420px; }
    .logo { background: #0d2055; color: #fff; text-align: center; padding: 20px; border-radius: 8px; margin-bottom: 28px; }
    .logo h1 { font-size: 20px; letter-spacing: 2px; }
    .logo p { color: #f57c00; font-size: 13px; margin-top: 4px; }
    h2 { font-size: 18px; color: #0d2055; margin-bottom: 20px; }
    label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 15px; margin-bottom: 16px; outline: none; }
    input:focus { border-color: #0d2055; }
    button { width: 100%; background: #f57c00; color: #fff; border: none; border-radius: 50px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; }
    button:hover { background: #e06900; }
    .msg { margin-top: 16px; padding: 12px 16px; border-radius: 8px; font-size: 14px; text-align: center; display: none; }
    .msg.ok { background: #d1fae5; color: #065f46; display: block; }
    .msg.err { background: #fee2e2; color: #991b1b; display: block; }
    .back { display: block; text-align: center; margin-top: 18px; color: #6b7280; font-size: 13px; text-decoration: none; }
    .back:hover { color: #0d2055; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>VIRTUS CASERTA</h1>
      <p>Reimposta password</p>
    </div>
    <h2>Nuova password</h2>
    <form id="form">
      <label for="password">Nuova password</label>
      <input type="password" id="password" placeholder="Almeno 6 caratteri" required minlength="6" />
      <label for="conferma">Conferma password</label>
      <input type="password" id="conferma" placeholder="Ripeti la password" required minlength="6" />
      <button type="submit">Reimposta password</button>
    </form>
    <div id="msg" class="msg"></div>
    <a href="/index.html" class="back">Torna alla home</a>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const token  = params.get('token');
    if (!token) {
      document.getElementById('msg').textContent = 'Link non valido. Richiedi un nuovo link.';
      document.getElementById('msg').className = 'msg err';
      document.getElementById('form').style.display = 'none';
    }

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const conferma = document.getElementById('conferma').value;
      const msg = document.getElementById('msg');

      if (password !== conferma) {
        msg.textContent = 'Le password non corrispondono.';
        msg.className = 'msg err';
        return;
      }

      try {
        const res = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json();
        if (res.ok) {
          msg.textContent = data.message + ' Ora puoi accedere con la nuova password.';
          msg.className = 'msg ok';
          document.getElementById('form').style.display = 'none';
        } else {
          msg.textContent = data.error || 'Errore. Riprova.';
          msg.className = 'msg err';
        }
      } catch {
        msg.textContent = 'Errore di rete. Riprova.';
        msg.className = 'msg err';
      }
    });
  </script>
</body>
</html>
