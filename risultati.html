<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risultati e Calendario – Virtus Caserta</title>
  <meta name="description" content="Risultati delle partite e calendario gare di Virtus Caserta.">
  <meta property="og:title" content="Risultati – Virtus Caserta">
  <meta property="og:image" content="/images/logo.png">
  <link rel="stylesheet" href="common.css">
  <style>
    :root{--blu:#0d2055;--blu-m:#1535a8;--arancio:#f57c00;--grigio:#f1f5f9;--verde:#16a34a;--rosso:#dc2626;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',Arial,sans-serif;background:var(--grigio);color:#222;}
    nav{position:fixed;top:0;left:0;width:100%;z-index:1000;background:var(--blu);box-shadow:0 2px 16px rgba(0,0,0,.35);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;height:76px;padding:0 40px;}
    .nav-menu{display:flex;align-items:center;gap:36px;list-style:none;justify-content:flex-end;}
    .nav-brand{display:flex;align-items:center;justify-content:center;text-decoration:none;padding:0 28px;}
    .nav-brand img{height:50px;object-fit:contain;}
    .nav-menu a{text-decoration:none;color:rgba(255,255,255,.82);font-size:14px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;}
    .nav-menu a.attivo,.nav-menu a:hover{color:#fff;}
    .nav-actions{display:flex;align-items:center;gap:14px;justify-content:flex-start;}
    .nav-social a img{width:34px;height:34px;object-fit:contain;filter:brightness(0) invert(1);}
    .hero{background:linear-gradient(135deg,var(--blu),var(--blu-m));padding:140px 24px 80px;text-align:center;color:#fff;}
    .hero h1{font-size:clamp(32px,6vw,52px);font-weight:900;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;}
    .hero p{font-size:17px;color:rgba(255,255,255,.75);max-width:560px;margin:0 auto;}
    .container{max-width:1000px;margin:0 auto;padding:0 24px;}
    section{padding:72px 0;}
    .sezione-titolo{text-align:center;margin-bottom:48px;}
    .etichetta{display:inline-block;background:var(--arancio);color:#fff;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:5px 16px;border-radius:20px;margin-bottom:14px;}
    .sezione-titolo h2{font-size:clamp(22px,4vw,34px);font-weight:900;color:var(--blu);letter-spacing:2px;text-transform:uppercase;}

    /* Categoria block */
    .cat-block{margin-bottom:52px;}
    .cat-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding-bottom:14px;border-bottom:3px solid var(--blu);flex-wrap:wrap;}
    .cat-titolo{font-size:clamp(15px,2.5vw,20px);font-weight:900;color:var(--blu);text-transform:uppercase;letter-spacing:1.5px;}
    .cat-count{font-size:12px;color:#9ca3af;font-weight:600;white-space:nowrap;}
    .cat-actions{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    .btn-classifica{display:inline-flex;align-items:center;gap:6px;background:var(--blu);color:#fff;text-decoration:none;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 16px;border-radius:20px;border:none;cursor:pointer;transition:background .15s;}
    .btn-classifica:hover{background:var(--blu-m);}
    .btn-espandi{display:inline-flex;align-items:center;gap:6px;background:#fff;color:var(--blu);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 16px;border-radius:20px;border:1.5px solid var(--blu);cursor:pointer;transition:all .15s;}
    .btn-espandi:hover{background:var(--blu);color:#fff;}

    /* Cards grid */
    .partite-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;}
    .partita-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:8px;transition:box-shadow .2s;}
    .partita-card:hover{box-shadow:0 4px 16px rgba(13,32,85,.10);}
    .partita-card.nascosta{display:none;}
    .partita-meta{font-size:11px;color:#9ca3af;font-weight:600;letter-spacing:.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .partita-squadre{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:4px 0;}
    .partita-squadra{font-size:13px;font-weight:800;color:var(--blu);flex:1;text-align:center;line-height:1.3;}
    .partita-squadra.virtus{color:var(--arancio);}
    .partita-vs{font-size:11px;color:#9ca3af;font-weight:700;padding:0 6px;white-space:nowrap;}
    .partita-risultato{text-align:center;font-size:22px;font-weight:900;letter-spacing:2px;color:var(--blu);}
    .partita-risultato.win{color:var(--verde);}
    .partita-risultato.loss{color:var(--rosso);}
    .partita-risultato.prossima{font-size:13px;color:#6b7280;font-weight:600;letter-spacing:0;}
    .partita-risultato.rinviata{font-size:12px;color:#b45309;font-weight:700;background:#fef3c7;padding:4px 10px;border-radius:8px;display:inline-block;}
    .esito-label{text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
    .esito-label.win{color:var(--verde);}
    .esito-label.loss{color:var(--rosso);}
    .parziali-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:4px;}
    .parziale{font-size:11px;font-weight:700;background:#f1f5f9;color:#374151;padding:2px 8px;border-radius:8px;}
    .luogo-row{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid #f0f4f8;font-size:12px;color:#6b7280;font-weight:500;line-height:1.4;}
    .luogo-icon{font-size:14px;flex-shrink:0;color:#9ca3af;}
    .luogo-text{flex:1;}
    /* Card "da disputare" più recente */
    .partita-card.prossima-card{border:1.5px solid #c7d9ff;background:#f5f8ff;}
    .partita-card.prossima-card .partita-meta{color:#4f5fa8;}
    /* Card "in corso" */
    @keyframes pulse-live{0%,100%{opacity:1;}50%{opacity:.4;}}
    .partita-card.in-corso-card{border:2px solid #16a34a;background:#f0fdf4;box-shadow:0 0 0 3px rgba(22,163,74,.12);}
    .partita-card.in-corso-card .partita-meta{color:#15803d;}
    .partita-risultato.in-corso{font-size:13px;font-weight:800;color:#15803d;display:flex;align-items:center;justify-content:center;gap:6px;letter-spacing:.5px;}
    .live-dot{width:9px;height:9px;border-radius:50%;background:#16a34a;flex-shrink:0;animation:pulse-live 1.2s ease-in-out infinite;}
    /* Loghi squadre */
    .partita-loghi{display:flex;align-items:center;justify-content:center;gap:16px;margin:4px 0 2px;}
    .partita-logo{width:44px;height:44px;object-fit:contain;border-radius:6px;border:1px solid #e5e7eb;padding:3px;background:#fff;}
    .partita-logo-vs{font-size:10px;font-weight:700;color:#9ca3af;letter-spacing:.5px;}
    /* Badge fonte */
    .fonte-badge{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 7px;border-radius:10px;margin-left:auto;}
    .fonte-opes{background:#e0f2fe;color:#0369a1;}
    .fonte-fipav{background:#ede9fe;color:#6d28d9;}
    /* Filtri */
    .filtri-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;justify-content:center;}
    .filtri-bar.sub{margin-bottom:28px;margin-top:0;}
    .filtro-btn{padding:8px 18px;border-radius:20px;border:1.5px solid #e2e8f0;background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:#374151;transition:all .15s;letter-spacing:.5px;}
    .filtro-btn:hover{border-color:var(--blu);color:var(--blu);}
    .filtro-btn.attivo{background:var(--blu);color:#fff;border-color:var(--blu);}
    .filtro-btn.attivo.f-opes{background:#0369a1;border-color:#0369a1;}
    .filtro-btn.attivo.f-fipav{background:#6d28d9;border-color:#6d28d9;}
    .sub-btn{padding:6px 14px;font-size:11px;border-radius:16px;border:1.5px solid #ddd6fe;background:#fff;color:#6d28d9;font-weight:700;cursor:pointer;transition:all .15s;}
    .sub-btn:hover{border-color:#6d28d9;background:#ede9fe;}
    .sub-btn.attivo{background:#6d28d9;color:#fff;border-color:#6d28d9;}
    .cat-block.nascosta-cat{display:none;}

    /* Espandi row */
    .espandi-row{text-align:center;margin-top:16px;}

    .fipav-btn{display:inline-flex;align-items:center;gap:8px;background:var(--blu);color:#fff;text-decoration:none;font-size:13px;font-weight:700;padding:12px 28px;border-radius:50px;margin-top:12px;transition:background .2s;}
    .fipav-btn:hover{background:var(--blu-m);}
    .fipav-footer{text-align:center;padding-top:8px;}

    .vuota{text-align:center;padding:60px;color:#888;font-size:15px;}
    footer{background:var(--blu);color:rgba(255,255,255,.5);text-align:center;padding:24px;font-size:13px;}
    footer a{color:rgba(255,255,255,.4);text-decoration:none;}
    @media(max-width:600px){
      nav{padding:0 16px;}
      .nav-menu a{font-size:11px;}
      .hero{padding:110px 16px 56px;}
      .partite-grid{grid-template-columns:1fr;}
      /* Cat header: stack verticalmente */
      .cat-header{flex-direction:column;align-items:flex-start;gap:6px;}
      .cat-actions{margin-left:0;width:100%;}
      .btn-classifica,.btn-espandi{font-size:10px;padding:6px 12px;}
      /* Filtri principali */
      .filtro-btn{padding:6px 12px;font-size:11px;letter-spacing:0;}
      /* Sub-filtri: scroll orizzontale anziché wrap */
      .filtri-bar.sub{flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;-webkit-overflow-scrolling:touch;padding-bottom:6px;scrollbar-width:none;}
      .filtri-bar.sub::-webkit-scrollbar{display:none;}
      .sub-btn{white-space:nowrap;padding:5px 10px;font-size:10px;flex-shrink:0;}
      /* Footer portali */
      .fipav-footer{display:flex;flex-direction:column;align-items:center;gap:8px;}
      .fipav-btn{width:100%;max-width:320px;justify-content:center;}
    }
  </style>
</head>
<body>
<nav>
  <ul class="nav-menu">
    <li><a href="/chi-siamo">Chi siamo</a></li>
    <li><a href="/notizie">Notizie</a></li>
    <li><a href="/squadra">Squadra</a></li>
  </ul>
  <a href="/" class="nav-brand"><img src="images/negativo@4x.png" alt="Virtus Caserta" loading="lazy"></a>
  <div class="nav-actions">
    <ul class="nav-menu" style="justify-content:flex-start;">
      <li><a href="/risultati" class="attivo">Risultati</a></li>
      <li><a href="/shop">Shop</a></li>
      <li><a href="/staff">Staff</a></li>
    </ul>
    <div class="nav-social" style="display:flex;gap:10px;margin-left:auto;">
      <a href="https://www.facebook.com/virtuscaserta" target="_blank" rel="noopener"><img src="images/facebook-icon.png" alt="Facebook"></a>
      <a href="https://www.instagram.com/virtuscaserta/" target="_blank" rel="noopener"><img src="images/instagram-icon.png" alt="Instagram"></a>
    </div>
  </div>
</nav>

<div class="hero"><h1>Risultati</h1><p>Il riepilogo delle nostre partite stagione per stagione.</p></div>

<section>
  <div class="container">
    <div class="sezione-titolo"><div class="etichetta">FIPAV · OPES</div><h2>Risultati &amp; Calendario</h2></div>
    <div class="filtri-bar" id="filtriBar" style="display:none">
      <button class="filtro-btn attivo" data-tipo="tutte" onclick="applyFiltro(this)">Tutte</button>
      <button class="filtro-btn f-fipav" data-tipo="fipav" onclick="applyFiltro(this)">FIPAV</button>
      <button class="filtro-btn f-opes" data-tipo="opes" onclick="applyFiltro(this)">OPES</button>
    </div>
    <div class="filtri-bar sub" id="sottofiltriBar" style="display:none"></div>
    <div id="risultatiContent"><div class="vuota">Caricamento…</div></div>
  </div>
</section>

<footer><p>© 2026 Virtus Caserta ASD · <a href="/privacy">Privacy</a> · <a href="/termini">Termini</a></p></footer>

<script>
  function isVirtus(name) { return /virtus/i.test(name); }

  function isInCorso(m) {
    if (m.played || m.postponed || !m.timestamp) return false;
    const now = Date.now();
    return m.timestamp < now && m.timestamp + 7200000 > now; // finestra 2 ore
  }

  function renderRisultato(m) {
    if (m.postponed)   return `<div class="partita-risultato rinviata">⚠️ Rinviata</div>`;
    if (isInCorso(m))  return `<div class="partita-risultato in-corso"><span class="live-dot"></span>In corso</div>`;
    if (!m.played)     return `<div class="partita-risultato prossima">da disputare</div>`;
    const parts = m.risultato.match(/(\d+)\s*-\s*(\d+)/);
    if (!parts)      return `<div class="partita-risultato">${m.risultato}</div>`;
    const [, s1, s2] = parts;
    const casaIsVirtus = isVirtus(m.casa);
    const virtusVince  = casaIsVirtus ? parseInt(s1) > parseInt(s2) : parseInt(s2) > parseInt(s1);
    const cls   = virtusVince ? 'win' : 'loss';
    const label = virtusVince ? 'Vittoria' : 'Sconfitta';
    return `<div class="partita-risultato ${cls}">${m.risultato}</div><div class="esito-label ${cls}">${label}</div>`;
  }

  function renderCard(m, nascosta) {
    const casaCls      = isVirtus(m.casa)   ? ' virtus' : '';
    const ospiteCls    = isVirtus(m.ospite) ? ' virtus' : '';
    const nascostaClass  = nascosta ? ' nascosta' : '';
    const inCorso        = isInCorso(m);
    const prossimaClass  = (!m.played && !m.postponed && !inCorso) ? ' prossima-card' : '';
    const inCorsoClass   = inCorso ? ' in-corso-card' : '';

    const proxy = u => u ? `/api/proxy-image?url=${encodeURIComponent(u)}` : '';
    const loghi = (m.logoHome || m.logoAway)
      ? `<div class="partita-loghi">
           <img class="partita-logo" src="${proxy(m.logoHome)}" alt="${m.casa}" onerror="this.style.display='none'">
           <span class="partita-logo-vs">VS</span>
           <img class="partita-logo" src="${proxy(m.logoAway)}" alt="${m.ospite}" onerror="this.style.display='none'">
         </div>`
      : '';

    const parziali = m.parziali && m.parziali.length
      ? `<div class="parziali-row">${m.parziali.map(p => `<span class="parziale">${p}</span>`).join('')}</div>`
      : '';

    const luogo = m.luogo
      ? `<div class="luogo-row"><span class="luogo-icon">📍</span><span class="luogo-text">${m.luogo}</span></div>`
      : '';

    const fonte = m.fonte === 'opes'
      ? `<span class="fonte-badge fonte-opes">OPES</span>`
      : `<span class="fonte-badge fonte-fipav">FIPAV</span>`;

    return `
      <div class="partita-card${nascostaClass}${prossimaClass}${inCorsoClass}">
        <div class="partita-meta">
          <span>Giornata ${m.giornata}</span>
          <span>·</span>
          <span>${m.dataOra}</span>
          ${fonte}
        </div>
        ${loghi}
        <div class="partita-squadre">
          <div class="partita-squadra${casaCls}">${m.casa}</div>
          <div class="partita-vs">vs</div>
          <div class="partita-squadra${ospiteCls}">${m.ospite}</div>
        </div>
        ${renderRisultato(m)}
        ${parziali}
        ${luogo}
      </div>`;
  }

  // Partite sorted DESC (future first, then past).
  // "Prossima" = the upcoming match CLOSEST to today = last unplayed before the first played.
  function getVisibiliIndices(partite) {
    const visibili = new Set();

    // Sempre visibili: partite in corso
    partite.forEach((m, i) => { if (isInCorso(m)) visibili.add(i); });

    const idxUltima = partite.findIndex(m => m.played);

    // Walk backwards from just before the first played match to find the soonest upcoming
    let idxProssima = -1;
    const scanTo = idxUltima >= 0 ? idxUltima : partite.length;
    for (let i = scanTo - 1; i >= 0; i--) {
      if (!partite[i].played && !partite[i].postponed && !isInCorso(partite[i])) { idxProssima = i; break; }
    }
    // Fallback: any unplayed non-live
    if (idxProssima < 0) idxProssima = partite.findIndex(m => !m.played && !m.postponed && !isInCorso(m));

    if (idxUltima   >= 0) visibili.add(idxUltima);
    if (idxProssima >= 0) visibili.add(idxProssima);
    if (!visibili.size)   visibili.add(0);
    return visibili;
  }

  function togglePartite(btn, gridId, visibiliIndices) {
    const grid = document.getElementById(gridId);
    const nascoste = grid.querySelectorAll('.partita-card.nascosta');
    if (nascoste.length > 0) {
      nascoste.forEach(c => c.classList.remove('nascosta'));
      btn.textContent = '▲ Mostra meno';
    } else {
      const cards = grid.querySelectorAll('.partita-card');
      cards.forEach((c, i) => { if (!visibiliIndices.has(i)) c.classList.add('nascosta'); });
      btn.textContent = `▼ Vedi tutte le partite`;
      grid.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }

  function getFipavAttivo() {
    return !!document.querySelector('.filtro-btn[data-tipo="fipav"].attivo');
  }

  function aggiornaSottofiltri() {
    const bar = document.getElementById('sottofiltriBar');
    if (!getFipavAttivo()) { bar.style.display = 'none'; return; }
    bar.style.display = 'flex';
  }

  function applySubFiltro(btnEl) {
    btnEl.classList.toggle('attivo');
    const attiviCat = new Set(
      [...document.querySelectorAll('#sottofiltriBar .sub-btn.attivo')].map(b => b.dataset.cat)
    );
    document.querySelectorAll('.cat-block[data-fonte="fipav"]').forEach(block => {
      if (!attiviCat.size) { block.classList.remove('nascosta-cat'); return; }
      block.classList.toggle('nascosta-cat', !attiviCat.has(block.dataset.cat));
    });
  }

  function applyFiltro(btnEl) {
    const tipo = btnEl.dataset.tipo;
    const tutteBtn = document.querySelector('.filtro-btn[data-tipo="tutte"]');

    if (tipo === 'tutte') {
      document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('attivo'));
      tutteBtn.classList.add('attivo');
      document.querySelectorAll('.cat-block').forEach(b => b.classList.remove('nascosta-cat'));
      // reset sub-filtri
      document.querySelectorAll('#sottofiltriBar .sub-btn').forEach(b => b.classList.remove('attivo'));
      aggiornaSottofiltri();
      return;
    }

    btnEl.classList.toggle('attivo');
    tutteBtn.classList.remove('attivo');

    const attivi = new Set(
      [...document.querySelectorAll('.filtro-btn:not([data-tipo="tutte"]).attivo')].map(b => b.dataset.tipo)
    );

    if (!attivi.size) {
      tutteBtn.classList.add('attivo');
      document.querySelectorAll('.cat-block').forEach(b => b.classList.remove('nascosta-cat'));
      document.querySelectorAll('#sottofiltriBar .sub-btn').forEach(b => b.classList.remove('attivo'));
      aggiornaSottofiltri();
      return;
    }

    // Applica filtro principale per fonte
    document.querySelectorAll('.cat-block').forEach(block => {
      block.classList.toggle('nascosta-cat', !attivi.has(block.dataset.fonte));
    });

    // Aggiorna visibilità sottofiltri; se FIPAV appena disattivato, reset sub-selezione
    if (!getFipavAttivo()) {
      document.querySelectorAll('#sottofiltriBar .sub-btn').forEach(b => b.classList.remove('attivo'));
    }
    aggiornaSottofiltri();
  }

  async function carica() {
    const cont = document.getElementById('risultatiContent');
    try {
      const data = await fetch('/api/partite/tutte').then(r => r.json());
      if (data.error) throw new Error(data.error);

      const entries = Object.entries(data.gruppi);
      if (!entries.length) { cont.innerHTML = '<div class="vuota">Nessuna partita disponibile.</div>'; return; }

      cont.innerHTML = entries.map(([cat, gruppo], i) => {
        const partite  = gruppo.partite;
        const fonte    = gruppo.fonte === 'opes' ? 'opes' : 'fipav';
        const gridId   = 'grid-' + i;
        const visibili = getVisibiliIndices(partite);
        const extra    = partite.length - visibili.size;

        // Classifica link: OPES → pagina classifica (dropdown), FIPAV → per cid
        const classificaHref = fonte === 'opes'
          ? '/classifica'
          : (gruppo.cid ? `/classifica?cid=${gruppo.cid}` : (gruppo.classificaUrl || '/classifica'));

        const visibiliArr = JSON.stringify([...visibili]);
        const btnEspandi  = extra > 0
          ? `<div class="espandi-row"><button class="btn-espandi" onclick="togglePartite(this,'${gridId}',new Set(${visibiliArr}))">▼ Vedi tutte le partite (${extra} in più)</button></div>`
          : '';

        return `
          <div class="cat-block" data-fonte="${fonte}" data-cat="${cat.replace(/"/g,'&quot;')}">
            <div class="cat-header">
              <span class="cat-titolo">${cat}</span>
              <span class="cat-count">${partite.length} gare</span>
              <div class="cat-actions">
                <a href="${classificaHref}" class="btn-classifica">🏆 Classifica</a>
              </div>
            </div>
            <div class="partite-grid" id="${gridId}">
              ${partite.map((m, idx) => renderCard(m, !visibili.has(idx))).join('')}
            </div>
            ${btnEspandi}
          </div>`;
      }).join('') +
      `<div class="fipav-footer">
        <a href="${data.fipavUrl}" target="_blank" rel="noopener" class="fipav-btn">🏐 Portale FIPAV Caserta</a>
        <a href="https://www.opespallavolo.it" target="_blank" rel="noopener" class="fipav-btn" style="background:#0369a1;">🏐 Portale OPES</a>
      </div>`;

      // Popola sotto-filtri per categorie FIPAV
      const fipavCats = entries
        .filter(([, g]) => g.fonte !== 'opes')
        .map(([cat]) => cat);
      const subBar = document.getElementById('sottofiltriBar');
      subBar.innerHTML = fipavCats.map(cat =>
        `<button class="sub-btn" data-cat="${cat.replace(/"/g,'&quot;')}" onclick="applySubFiltro(this)">${cat}</button>`
      ).join('');

      // Mostra barra filtri solo dopo caricamento
      document.getElementById('filtriBar').style.display = 'flex';
    } catch (err) {
      cont.innerHTML = `
        <div class="vuota">
          <p style="margin-bottom:16px;">Impossibile caricare le partite: ${err.message}</p>
          <a href="https://caserta.portalefipav.net/" target="_blank" rel="noopener" class="fipav-btn">🏐 Portale FIPAV Caserta</a>
        </div>`;
    }
  }

  carica();
</script>
<script src="common.js"></script>
</body>
</html>
