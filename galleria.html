<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galleria – Virtus Caserta</title>
  <meta name="description" content="Galleria fotografica di Virtus Caserta: partite, allenamenti ed eventi.">
  <meta property="og:title" content="Galleria – Virtus Caserta">
  <meta property="og:image" content="/images/logo.png">
  <style>
    :root{--blu:#0d2055;--blu-m:#1535a8;--arancio:#f57c00;--grigio:#f1f5f9;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',Arial,sans-serif;background:#111;color:#fff;}
    nav{position:fixed;top:0;left:0;width:100%;z-index:1000;background:var(--blu);box-shadow:0 2px 16px rgba(0,0,0,.5);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;height:76px;padding:0 40px;}
    .nav-menu{display:flex;align-items:center;gap:36px;list-style:none;justify-content:flex-end;}
    .nav-brand{display:flex;align-items:center;justify-content:center;text-decoration:none;padding:0 28px;}
    .nav-brand img{height:50px;object-fit:contain;}
    .nav-menu a{text-decoration:none;color:rgba(255,255,255,.82);font-size:14px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;}
    .nav-menu a.attivo,.nav-menu a:hover{color:#fff;}
    .nav-actions{display:flex;align-items:center;gap:14px;justify-content:flex-start;}
    .nav-social a img{width:34px;height:34px;object-fit:contain;filter:brightness(0) invert(1);}
    .hero{padding:120px 24px 60px;text-align:center;background:linear-gradient(135deg,var(--blu),var(--blu-m));}
    .hero h1{font-size:clamp(32px,6vw,52px);font-weight:900;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;}
    .hero p{font-size:16px;color:rgba(255,255,255,.7);}
    .container{max-width:1200px;margin:0 auto;padding:0 20px;}
    .filtro-bar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:32px 0 24px;}
    .filtro-btn{padding:8px 22px;border-radius:20px;border:1.5px solid rgba(255,255,255,.2);background:transparent;font-size:13px;font-weight:700;cursor:pointer;color:rgba(255,255,255,.7);transition:all .15s;}
    .filtro-btn.on,.filtro-btn:hover{background:var(--arancio);border-color:var(--arancio);color:#fff;}
    .galleria-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:4px;padding-bottom:80px;}
    .foto-item{position:relative;overflow:hidden;aspect-ratio:1;cursor:pointer;background:#1a1a1a;}
    .foto-item img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
    .foto-item:hover img{transform:scale(1.05);}
    .foto-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);opacity:0;transition:opacity .2s;display:flex;align-items:flex-end;padding:16px;}
    .foto-item:hover .foto-overlay{opacity:1;}
    .foto-titolo{font-size:13px;font-weight:700;color:#fff;}
    .vuota{text-align:center;padding:80px;color:rgba(255,255,255,.4);font-size:16px;}
    /* LIGHTBOX */
    .lightbox{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.95);display:none;align-items:center;justify-content:center;}
    .lightbox.aperta{display:flex;}
    .lightbox img{max-width:90vw;max-height:88vh;object-fit:contain;border-radius:4px;}
    .lightbox-close{position:absolute;top:20px;right:24px;font-size:32px;color:#fff;cursor:pointer;line-height:1;background:none;border:none;}
    .lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;font-size:28px;padding:12px 16px;cursor:pointer;border-radius:8px;transition:background .2s;}
    .lightbox-nav:hover{background:rgba(255,255,255,.3);}
    #lightboxPrev{left:16px;}
    #lightboxNext{right:16px;}
    footer{background:var(--blu);padding:24px;text-align:center;font-size:13px;color:rgba(255,255,255,.5);}
    footer a{color:rgba(255,255,255,.4);text-decoration:none;}
    @media(max-width:600px){nav{padding:0 16px;}.nav-menu a{font-size:11px;}.galleria-grid{grid-template-columns:1fr 1fr;}}
  </style>
</head>
<body>
<nav>
  <ul class="nav-menu">
    <li><a href="/chi-siamo">Chi siamo</a></li>
    <li><a href="/squadra">Squadra</a></li>
  </ul>
  <a href="/" class="nav-brand"><img src="images/logo.png" alt="Virtus Caserta" loading="lazy"></a>
  <div class="nav-actions">
    <ul class="nav-menu" style="justify-content:flex-start;">
      <li><a href="/galleria" class="attivo">Galleria</a></li>
      <li><a href="/shop">Shop</a></li>
    </ul>
    <div class="nav-social" style="display:flex;gap:10px;margin-left:auto;">
      <a href="https://www.facebook.com/virtuscaserta" target="_blank" rel="noopener"><img src="images/facebook-icon.png" alt="Facebook"></a>
      <a href="https://www.instagram.com/virtuscaserta/" target="_blank" rel="noopener"><img src="images/instagram-icon.png" alt="Instagram"></a>
    </div>
  </div>
</nav>

<div class="hero"><h1>Galleria</h1><p>I nostri momenti più belli in campo.</p></div>

<div class="container">
  <div class="filtro-bar" id="filtroBarra"><button class="filtro-btn on" onclick="filtra('')">Tutti</button></div>
  <div class="galleria-grid" id="galleriaGrid"><div class="vuota">Caricamento…</div></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="chiudiLightbox()">✕</button>
  <button class="lightbox-nav" id="lightboxPrev" onclick="lightboxNav(-1)">‹</button>
  <img id="lightboxImg" src="" alt="">
  <button class="lightbox-nav" id="lightboxNext" onclick="lightboxNav(1)">›</button>
</div>

<footer><p>© 2026 Virtus Caserta ASD · <a href="/privacy">Privacy</a> · <a href="/termini">Termini</a></p></footer>

<script>
  let tuttefoto = [];
  let fotoFiltrate = [];
  let lightboxIdx = 0;

  async function carica() {
    try {
      tuttefoto = await fetch('/api/galleria').then(r => r.json());
      renderAlbum();
      renderFoto(tuttefoto);
    } catch { document.getElementById('galleriaGrid').innerHTML = '<div class="vuota">Errore caricamento.</div>'; }
  }

  function renderAlbum() {
    const albums = [...new Set(tuttefoto.map(f => f.album))];
    if (albums.length < 2) return;
    const bar = document.getElementById('filtroBarra');
    bar.innerHTML = `<button class="filtro-btn on" onclick="filtra('')">Tutti</button>` +
      albums.map(a => `<button class="filtro-btn" onclick="filtra('${a}')">${a}</button>`).join('');
  }

  function filtra(album) {
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.toggle('on', b.textContent === (album || 'Tutti')));
    const lista = album ? tuttefoto.filter(f => f.album === album) : tuttefoto;
    renderFoto(lista);
  }

  function renderFoto(lista) {
    fotoFiltrate = lista;
    const grid = document.getElementById('galleriaGrid');
    if (!lista.length) { grid.innerHTML = '<div class="vuota">Nessuna foto.</div>'; return; }
    grid.innerHTML = lista.map((f, i) => `
      <div class="foto-item" onclick="apriLightbox(${i})">
        <img src="${f.immagine}" alt="${f.titolo || f.album}" loading="lazy">
        <div class="foto-overlay">${f.titolo ? `<div class="foto-titolo">${f.titolo}</div>` : ''}</div>
      </div>`).join('');
  }

  function apriLightbox(i) {
    lightboxIdx = i;
    document.getElementById('lightboxImg').src = fotoFiltrate[i].immagine;
    document.getElementById('lightbox').classList.add('aperta');
  }
  function chiudiLightbox() { document.getElementById('lightbox').classList.remove('aperta'); }
  function lightboxNav(d) {
    lightboxIdx = (lightboxIdx + d + fotoFiltrate.length) % fotoFiltrate.length;
    document.getElementById('lightboxImg').src = fotoFiltrate[lightboxIdx].immagine;
  }
  document.getElementById('lightbox').addEventListener('click', e => { if (e.target === e.currentTarget) chiudiLightbox(); });
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('aperta')) return;
    if (e.key === 'Escape') chiudiLightbox();
    if (e.key === 'ArrowLeft') lightboxNav(-1);
    if (e.key === 'ArrowRight') lightboxNav(1);
  });

  carica();
</script>
<script src="common.js"></script>
</body>
</html>
